<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>用户信息</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(to bottom, #f4f4f9, #e0e0e0); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .container { 
            background: white; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); 
            width: 400px; 
            text-align: center; 
            transition: transform 0.3s ease; 
        }
        .container:hover { transform: translateY(-5px); }
        h2 { 
            color: #0056b3; 
            font-size: 1.8em; 
            margin-bottom: 15px; 
        }
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            margin: 12px 0; 
            border: 1px solid #ccc; 
            border-radius: 6px; 
            box-sizing: border-box; 
            transition: border-color 0.3s ease; 
        }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #007bff; }
        input[type="submit"] { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(to right, #007bff, #0056b3); 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 16px; 
            transition: background 0.3s ease; 
            margin-top: 15px; 
        }
        input[type="submit"]:hover { background: linear-gradient(to right, #0056b3, #003d80); }
    </style>
</head>
<body>
    <div class="container">
        <h2>修改用户名</h2>
        <form action="/user_info" method="post">
            新用户名: <input type="text" name="new_username"><br>
            <input type="submit" value="修改用户名">
        </form>

        <h2>修改密码</h2>
        <form action="/user_info" method="post">
            当前密码: <input type="password" name="current_password"><br>
            新密码: <input type="password" name="new_password"><br>
            确认新密码: <input type="password" name="confirm_password"><br>
            <input type="submit" value="修改密码">
        </form>
    </div>
</body>
</html>
